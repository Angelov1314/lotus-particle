<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Three.js 粒子手势控制 - 莲花</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        /* 隐藏摄像头画面，但保持 MediaPipe 运行 */
        #input_video { position: fixed; top: 10px; left: 10px; width: 240px; height: 180px; transform: scaleX(-1); border-radius: 8px; border: 2px solid #555; z-index: 10; }
        #status { position: fixed; bottom: 20px; left: 20px; color: #00ffcc; z-index: 10; font-size: 14px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    <div id="status">正在初始化摄像头和模型...</div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // MediaPipe 脚本加载逻辑
        const mpScript = document.createElement('script');
        mpScript.src = "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";
        document.head.appendChild(mpScript);
        const camScript = document.createElement('script');
        camScript.src = "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";
        document.head.appendChild(camScript);

        // --- 变量定义 ---
        let scene, camera, renderer, controls, points;
        let targetProgress = 0; // 手势目标状态：0 聚合，1 扩散
        let currentProgress = 0; // 当前动画进度
        const videoElement = document.getElementById('input_video');
        const statusElement = document.getElementById('status');

        // --- 着色器代码 ---
        const vertexShader = `
            uniform float uTime;
            uniform float uProgress;
            attribute vec3 aRandom;
            varying float vOpacity;

            void main() {
                // 基础位置
                vec3 pos = position;

                // 1. 轻微飘浮/抖动
                pos.x += sin(uTime * 0.5 + position.y * 10.0) * 0.02;
                pos.y += cos(uTime * 0.4 + position.x * 10.0) * 0.02;

                // 2. 扩散动画：根据 uProgress 将粒子沿随机方向推开
                // aRandom 是在 JS 中生成的随机向量
                pos += aRandom * uProgress * 2.5;

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);

                // 粒子大小随距离衰减
                gl_PointSize = (15.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;

                // 3. 透明度随扩散增加而减小
                vOpacity = 1.0 - uProgress * 0.8;
            }
        `;

        const fragmentShader = `
            varying float vOpacity;
            void main() {
                // 制作软圆点：计算点内坐标到中心的距离
                float d = distance(gl_PointCoord, vec2(0.5));
                float strength = 0.05 / d - 0.1; // 边缘渐隐公式
                strength = clamp(strength, 0.0, 1.0);

                // 发光颜色（淡青色/白色）
                vec3 color = vec3(0.5, 0.8, 1.0);
                gl_FragColor = vec4(color, strength * vOpacity);
            }
        `;

        // --- 初始化 Three.js ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            loadModel();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // --- 加载模型并转换粒子 ---
        function loadModel() {
            const loader = new GLTFLoader();
            loader.load('./莲花.glb', (gltf) => {
                const vertices = [];
                gltf.scene.traverse((child) => {
                    if (child.isMesh) {
                        // 提取顶点位置
                        const posAttr = child.geometry.attributes.position;
                        for (let i = 0; i < posAttr.count; i++) {
                            vertices.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
                        }
                    }
                });

                const geometry = new THREE.BufferGeometry();
                const posArray = new Float32Array(vertices);
                geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                // 生成随机偏移向量供扩散使用
                const randomArray = new Float32Array(posArray.length);
                for (let i = 0; i < posArray.length; i++) {
                    randomArray[i] = (Math.random() - 0.5) * 2.0;
                }
                geometry.setAttribute('aRandom', new THREE.BufferAttribute(randomArray, 3));

                // 创建着色器材质
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uProgress: { value: 0 }
                    },
                    vertexShader,
                    fragmentShader,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                points = new THREE.Points(geometry, material);
                points.scale.setScalar(4);
                scene.add(points);
                statusElement.innerText = "模型加载成功，请展示手势（握拳聚合，张掌扩散）";
            }, undefined, (error) => {
                console.error(error);
                statusElement.innerText = "模型加载失败";
            });
        }

        // --- MediaPipe 手势识别 ---
        function initHandTracking() {
            // 等待库加载
            const timer = setInterval(() => {
                if (window.Hands && window.Camera) {
                    clearInterval(timer);
                    setupMediaPipe();
                }
            }, 100);
        }

        function setupMediaPipe() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];

                    // 简单的手势逻辑：计算手指尖到掌心（Landmark 0）的平均距离
                    // 0: 腕部, 8: 食指尖, 12: 中指尖, 16: 无名指尖, 20: 小指尖
                    const tips = [8, 12, 16, 20];
                    let totalDist = 0;
                    tips.forEach(idx => {
                        const dx = landmarks[idx].x - landmarks[0].x;
                        const dy = landmarks[idx].y - landmarks[0].y;
                        totalDist += Math.sqrt(dx * dx + dy * dy);
                    });

                    const avgDist = totalDist / 4;
                    // 经验值：大于 0.4 视为张开，小于 0.2 视为握拳
                    if (avgDist > 0.35) {
                        targetProgress = 1.0; // 扩散
                    } else if (avgDist < 0.22) {
                        targetProgress = 0.0; // 聚合
                    }
                }
            });

            const cameraPipe = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraPipe.start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now() * 0.001;

            if (points) {
                // 1. 整体缓慢旋转
                points.rotation.y += 0.005;

                // 2. 平滑插值动画 (Lerp) 使得汇聚效果流畅
                currentProgress += (targetProgress - currentProgress) * 0.03;

                // 3. 更新着色器 Uniforms
                points.material.uniforms.uTime.value = time;
                points.material.uniforms.uProgress.value = currentProgress;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // 启动
        initThree();
        initHandTracking();

    </script>
</body>
</html>
