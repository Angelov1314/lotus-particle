<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Three.js 粒子手势控制 - 莲花</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #container { width: 100vw; height: 100vh; }
        #input_video { position: fixed; top: 10px; left: 10px; width: 180px; height: 135px; transform: scaleX(-1); border-radius: 6px; border: 1px solid #333; z-index: 10; opacity: 0.7; }
        #status { position: fixed; bottom: 16px; left: 16px; color: #00ffcc; z-index: 10; font-size: 12px; text-shadow: 0 0 8px #00ffcc44; }
        #drop-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,255,200,0.06); border: 2px dashed #00ffcc;
            z-index: 20; align-items: center; justify-content: center;
            font-size: 20px; color: #00ffcc; pointer-events: none;
        }
        #drop-overlay.active { display: flex; }

        /* Side panel */
        #panel {
            position: fixed; top: 0; right: 0; bottom: 0; width: 200px;
            background: rgba(0,0,0,0.75); border-left: 1px solid #1a1a2e;
            z-index: 10; padding: 12px 10px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-section { display: flex; flex-direction: column; gap: 6px; }
        .panel-label { color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding-bottom: 2px; border-bottom: 1px solid #1a1a2e; }
        .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 55px;
            background: rgba(255,255,255,0.04); border: 1px solid #2a2a3e;
            color: #667; font-family: monospace; font-size: 10px;
            padding: 5px 4px; cursor: pointer; border-radius: 3px;
            transition: all 0.15s; text-align: center;
        }
        .btn:hover { border-color: #445; color: #99a; }
        .btn.active { border-color: #00ffcc88; color: #00ffcc; background: rgba(0,255,200,0.07); }
        .btn.toggle-on { border-color: #88aaff88; color: #88aaff; background: rgba(100,130,255,0.07); }
        .upload-btn {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid #2a2a3e;
            color: #667; font-family: monospace; font-size: 10px;
            padding: 6px; cursor: pointer; border-radius: 3px; text-align: center;
        }
        .upload-btn:hover { border-color: #445; color: #99a; }

        /* Sculpt mode */
        .slider-row { display: flex; align-items: center; gap: 6px; }
        .slider-row label { color: #667; font-size: 9px; min-width: 40px; }
        .slider-row input[type="range"] {
            -webkit-appearance: none; appearance: none; flex: 1;
            height: 2px; background: #333; border-radius: 2px; outline: none;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            border-radius: 50%; background: #00ffcc; cursor: pointer;
        }
        .slider-row .val { color: #556; font-size: 9px; min-width: 22px; text-align: right; }
        #sculpt-section { display: none; }
        #sculpt-section.visible { display: flex; }
        .color-swatch {
            width: 18px; height: 18px; border-radius: 3px; border: 1px solid #333;
            cursor: pointer; padding: 0; outline: none;
        }
        .color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
        .color-swatch::-webkit-color-swatch { border: none; border-radius: 2px; }
        .sculpt-brush-indicator {
            position: fixed; pointer-events: none; z-index: 15;
            border: 1px solid rgba(0,255,200,0.4); border-radius: 50%;
            transform: translate(-50%, -50%); display: none;
        }

        /* Fullscreen: fade out ALL UI, reveal on mouse move */
        #ui-overlay {
            transition: opacity 0.5s;
        }
        #ui-overlay.fs-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Music player bar */
        #music-bar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.6); border: 1px solid #1a1a2e;
            border-radius: 20px; padding: 6px 14px; z-index: 10;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #music-bar.visible { opacity: 1; pointer-events: auto; }
        #music-bar button {
            background: none; border: none; color: #00ffcc; cursor: pointer;
            font-size: 16px; padding: 2px 4px; line-height: 1;
        }
        #music-bar button:hover { color: #fff; }
        #music-vol {
            -webkit-appearance: none; appearance: none;
            width: 70px; height: 2px; background: #333;
            border-radius: 2px; cursor: pointer; outline: none;
        }
        #music-vol::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            border-radius: 50%; background: #00ffcc; cursor: pointer;
        }
        #music-title {
            color: #667; font-size: 10px; font-family: monospace;
            max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="container"></div>
<div class="sculpt-brush-indicator" id="brush-cursor"></div>
<audio id="bgm" loop preload="auto"></audio>

<div id="ui-overlay">
    <video id="input_video" autoplay playsinline></video>
    <div id="status">initializing...</div>
    <div id="drop-overlay">drop GLB here</div>

    <!-- Music player bar -->
    <div id="music-bar">
        <button id="btn-play-pause" title="play/pause">▶</button>
        <span id="music-title">Sakura Plains</span>
        <input type="range" id="music-vol" min="0" max="1" step="0.01" value="0.5" title="volume">
        <button id="btn-music-close" title="hide">✕</button>
    </div>

    <div id="panel">
    <div class="panel-section">
        <div class="btn-row">
            <button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="fullscreen">⛶ fullscreen</button>
            <button class="btn" id="btn-music" onclick="toggleMusicBar()" title="music">♪ music</button>
        </div>
    </div>
    <div class="panel-section">
        <div class="panel-label">mode</div>
        <div class="btn-row">
            <button class="btn active" id="btn-mode-particle" onclick="setMode('particle')">particles</button>
            <button class="btn" id="btn-mode-sculpt" onclick="setMode('sculpt')">sculpt</button>
        </div>
    </div>

    <div class="panel-section" id="sculpt-section">
        <div class="panel-label">sculpt</div>
        <div class="btn-row">
            <button class="btn active" id="btn-brush-push" onclick="setBrush('push')">push</button>
            <button class="btn" id="btn-brush-pull" onclick="setBrush('pull')">pull</button>
            <button class="btn" id="btn-brush-smooth" onclick="setBrush('smooth')">smooth</button>
        </div>
        <div class="slider-row">
            <label>size</label>
            <input type="range" min="0.1" max="3" step="0.1" value="1.0" id="brush-size">
            <span class="val" id="brush-size-val">1.0</span>
        </div>
        <div class="slider-row">
            <label>strength</label>
            <input type="range" min="0.01" max="0.5" step="0.01" value="0.1" id="brush-strength">
            <span class="val" id="brush-strength-val">0.10</span>
        </div>
        <div class="panel-label" style="margin-top:6px">body sliders</div>
        <div class="slider-row">
            <label>head</label>
            <input type="range" min="0.5" max="2.0" step="0.05" value="1.0" id="sl-head">
            <span class="val" id="sl-head-val">1.0</span>
        </div>
        <div class="slider-row">
            <label>torso</label>
            <input type="range" min="0.5" max="2.0" step="0.05" value="1.0" id="sl-torso">
            <span class="val" id="sl-torso-val">1.0</span>
        </div>
        <div class="slider-row">
            <label>legs</label>
            <input type="range" min="0.5" max="2.0" step="0.05" value="1.0" id="sl-legs">
            <span class="val" id="sl-legs-val">1.0</span>
        </div>
        <div class="panel-label" style="margin-top:6px">zone colors</div>
        <div class="btn-row" style="align-items:center">
            <label style="color:#667;font-size:9px">head</label>
            <input type="color" class="color-swatch" id="zc-head" value="#80ccff">
            <label style="color:#667;font-size:9px">body</label>
            <input type="color" class="color-swatch" id="zc-body" value="#80ccff">
            <label style="color:#667;font-size:9px">legs</label>
            <input type="color" class="color-swatch" id="zc-legs" value="#80ccff">
        </div>
        <button class="btn" onclick="resetSculpt()" style="margin-top:6px">↺ reset shape</button>
    </div>

    <div class="panel-section">
        <div class="panel-label">color</div>
        <div class="btn-row">
            <button class="btn active" id="btn-untextured" onclick="setColorMode('untextured')">cyan</button>
            <button class="btn" id="btn-textured" onclick="setColorMode('textured')">texture</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-aurora" onclick="setColorMode('aurora')">aurora</button>
            <button class="btn" id="btn-thermal" onclick="setColorMode('thermal')">thermal</button>
        </div>
    </div>

    <div class="panel-section">
        <div class="panel-label">physics</div>
        <div class="btn-row">
            <button class="btn active" id="btn-linear" onclick="setPhysics('linear')">linear</button>
            <button class="btn" id="btn-vortex" onclick="setPhysics('vortex')">vortex</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-accretion" onclick="setPhysics('accretion')">accretion</button>
            <button class="btn" id="btn-gravity" onclick="setPhysics('gravity')">gravity</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-drift" onclick="setPhysics('drift')">↑ drift</button>
            <button class="btn" id="btn-tesseract" onclick="setPhysics('tesseract')">4D flow</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-aizawa" onclick="setPhysics('aizawa')">chaos</button>
        </div>
    </div>

    <div class="panel-section">
        <div class="panel-label">fx</div>
        <div class="btn-row">
            <button class="btn" id="btn-flicker" onclick="toggleFX('flicker')">flicker</button>
            <button class="btn" id="btn-holo" onclick="toggleFX('holo')">holo</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-curl" onclick="toggleFX('curl')">curl</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-spring" onclick="toggleFX('spring')">spring</button>
            <button class="btn" id="btn-bloom" onclick="toggleFX('bloom')">bloom</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-ripple" onclick="toggleFX('ripple')">ripple</button>
            <button class="btn" id="btn-erode" onclick="toggleFX('erode')">erode</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-blueTears" onclick="toggleFX('blueTears')">蓝眼泪</button>
        </div>
    </div>

    <div class="panel-section">
        <div class="panel-label">model queue (up to 10)</div>
        <div id="glb-queue-list"></div>
        <label class="upload-btn" id="label-add-glb">+ add GLB
            <input type="file" accept=".glb" style="display:none" id="file-input-add" multiple>
        </label>
        <label class="upload-btn" id="label-add-image">+ add image
            <input type="file" accept="image/png,image/jpeg,image/webp" style="display:none" id="file-input-image" multiple>
        </label>
        <button class="btn" id="btn-reset-swap" onclick="resetQueue()" style="display:none;margin-top:4px">↺ restart queue</button>
    </div>
    </div><!-- end #panel -->
</div><!-- end #ui-overlay -->

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// load MediaPipe
['https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js',
 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js'
].forEach(src => { const s = document.createElement('script'); s.src = src; document.head.appendChild(s); });

// ─── State ───────────────────────────────────────────────────────────────────
let scene, camera, renderer, controls, points, composer, bloomPass;
let cachedVertices = null, cachedGltf = null, cachedColors = null;
let colorMode = 'untextured', physicsMode = 'linear';
let fx = { flicker: false, holo: false, curl: false, spring: false, bloom: false, ripple: false, erode: false, blueTears: false };

// Sculpt mode
let sculptMode = false;
let brushType = 'push'; // push, pull, smooth
let brushSize = 1.0;
let brushStrength = 0.1;
let sculptMouseDown = false;
let modelBoundsY = { min: -1, max: 1 }; // updated when model loads
let mouseWorld = new THREE.Vector2(-999, -999); // lerp target, starts off-screen
let holoTime = 0; // tracks holo flicker phase

let targetProgress = 0, currentProgress = 0, velocity = 0;
let palmX = 0, palmY = 0;
let hasSwapped = false;

const STATUS = document.getElementById('status');

// ─── Shaders ─────────────────────────────────────────────────────────────────
const vertexShader = `
    uniform float uTime;
    uniform float uProgress;
    uniform int uPhysics;     // 0=linear, 1=vortex, 2=accretion, 3=gravity, 4=drift, 5=tesseract, 6=aizawa
    uniform int uColorMode;   // 0=cyan, 1=texture, 2=aurora, 3=thermal
    uniform bool uFlicker;
    uniform bool uHolo;
    uniform bool uCurl;
    uniform bool uRipple;
    uniform bool uErode;
    uniform float uErodePhase; // 0→1 full cycle: 0=intact, 0.6=fully eroded, 1=reassembled
    uniform vec2 uPalm;
    uniform vec2 uMouse;       // world-space XY of cursor, lerp-smoothed
    uniform float uHoloBrightness;

    // Sculpt mode
    uniform bool uSculptMode;
    uniform float uHeadScale;
    uniform float uTorsoScale;
    uniform float uLegScale;
    uniform vec3 uZoneColorHead;
    uniform vec3 uZoneColorBody;
    uniform vec3 uZoneColorLegs;
    uniform float uModelYMin;   // model bounding box Y min
    uniform float uModelYMax;   // model bounding box Y max

    attribute vec3 aRandom;
    attribute float aOffset;
    attribute vec3 aColor;
    attribute vec3 aDeformation;  // persistent sculpt offsets

    varying vec3 vColor;
    varying float vOpacity;
    varying float vBrightBoost;
    varying vec3 vWorldPos;
    varying float vHoloBrightness;

    // ── Simplex 3D noise ─────────────────────────────────────────────────────
    vec3 mod289v3(vec3 x) { return x - floor(x*(1./289.))*289.; }
    vec4 mod289v4(vec4 x) { return x - floor(x*(1./289.))*289.; }
    vec4 permute(vec4 x){ return mod289v4(((x*34.)+1.)*x); }
    vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159-0.85373472095314*r; }
    float snoise(vec3 v){
        const vec2 C=vec2(1./6.,1./3.);
        const vec4 D=vec4(0.,0.5,1.,2.);
        vec3 i=floor(v+dot(v,C.yyy));
        vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz);
        vec3 l=1.-g;
        vec3 i1=min(g.xyz,l.zxy);
        vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx;
        vec3 x2=x0-i2+C.yyy;
        vec3 x3=x0-D.yyy;
        i=mod289v3(i);
        vec4 p=permute(permute(permute(
            i.z+vec4(0.,i1.z,i2.z,1.))
           +i.y+vec4(0.,i1.y,i2.y,1.))
           +i.x+vec4(0.,i1.x,i2.x,1.));
        float n_=.142857142857;
        vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z);
        vec4 y_=floor(j-7.*x_);
        vec4 x=x_*ns.x+ns.yyyy;
        vec4 y=y_*ns.x+ns.yyyy;
        vec4 h=1.-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy);
        vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.+1.;
        vec4 s1=floor(b1)*2.+1.;
        vec4 sh=-step(h,vec4(0.));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
        vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x);
        vec3 p1=vec3(a0.zw,h.y);
        vec3 p2=vec3(a1.xy,h.z);
        vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
        vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
        m=m*m;
        return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }

    vec3 curlNoise(vec3 p){
        float e=0.02;
        float n1,n2;
        vec3 curl;
        n1=snoise(p+vec3(0,e,0)); n2=snoise(p-vec3(0,e,0)); curl.x=(n1-n2)/(2.*e);
        n1=snoise(p+vec3(0,0,e)); n2=snoise(p-vec3(0,0,e)); curl.y=(n1-n2)/(2.*e);
        n1=snoise(p+vec3(e,0,0)); n2=snoise(p-vec3(e,0,0)); curl.z=(n1-n2)/(2.*e);
        return curl;
    }

    vec3 rotateY(vec3 v,float a){
        float s=sin(a),c=cos(a);
        return vec3(v.x*c+v.z*s,v.y,-v.x*s+v.z*c);
    }

    vec3 hsv2rgb(vec3 c){
        vec4 K=vec4(1.,2./3.,1./3.,3.);
        vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
        return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
    }

    void main(){
        vec3 pos = position;

        // ── Sculpt: apply persistent deformation ─────────────────────────────
        pos += aDeformation;

        // ── Sculpt: body zone scaling ────────────────────────────────────────
        if(uSculptMode || uHeadScale != 1.0 || uTorsoScale != 1.0 || uLegScale != 1.0){
            float yRange = uModelYMax - uModelYMin;
            float yNorm = (pos.y - uModelYMin) / max(yRange, 0.001); // 0=bottom, 1=top

            // Zone boundaries (normalized): legs 0-0.4, torso 0.4-0.75, head 0.75-1.0
            float legT    = smoothstep(0.0, 0.4, yNorm);
            float torsoT  = smoothstep(0.4, 0.75, yNorm);
            float headT   = smoothstep(0.75, 1.0, yNorm);

            // Scale XZ per zone, keeping Y position intact
            float zoneScale = mix(uLegScale, uTorsoScale, legT);
            zoneScale = mix(zoneScale, uHeadScale, torsoT);

            // Find model center X/Z (assume ~0) and scale outward
            pos.xz *= zoneScale;
        }

        // ── Physics ───────────────────────────────────────────────────────────
        float projScale = 1.0; // overridden by 4D projection in mode 5
        if(uPhysics == 1){
            // Vortex: spiral inward on fist
            float angle = uProgress * 5.0 * (1.0 - length(pos.xz) * 0.5);
            pos = rotateY(pos, angle);
            pos += aRandom * uProgress * 2.5;

        } else if(uPhysics == 2){
            // Accretion disk: partial flatten + gentle Keplerian orbit
            // Keep 30% of Y height so the flower retains some 3D volume
            float flatten = mix(1.0, 0.3, 1.0 - uProgress);
            pos.y *= flatten;
            float radius = length(pos.xz);
            // Slower orbit: cap orbital speed so inner particles don't spin into a blur
            float orbitalSpeed = (1.0 - uProgress) * 1.2 / max(radius, 0.5);
            float angle = uTime * orbitalSpeed;
            float s = sin(angle), c = cos(angle);
            vec2 rot = vec2(pos.x*c - pos.z*s, pos.x*s + pos.z*c);
            pos.x = rot.x; pos.z = rot.y;
            pos += aRandom * uProgress * 2.5;

        } else if(uPhysics == 3){
            // Gravity well: palm attracts/repels
            vec3 attractor = vec3(uPalm.x, uPalm.y, 0.0);
            vec3 dir = attractor - pos;
            float dist = max(length(dir), 0.5);
            float force = (uProgress > 0.5 ? -4.0 : 4.0) / (dist * dist);
            pos += normalize(dir) * force * 0.08;
            pos += aRandom * uProgress * 2.5;

        } else if(uPhysics == 4){
            // Drift: most particles stay in place (preserve shape), only a
            // sparse subset (~12%) slowly and continuously rise upward.
            // Selection is deterministic via aOffset so the same particles
            // always drift, giving a "soul embers rising" look.
            float selector = fract(sin(aOffset * 431.7) * 7823.3); // 0-1 hash per particle
            bool isDrifter = selector < 0.12; // ~12% of particles

            if(isDrifter){
                // Each drifter has its own speed (slow, meditative)
                float speed = 0.02 + selector * 0.15; // 0.02 ~ 0.034
                // Rise continuously over time, wrap at large height to loop back
                float rise = mod(uTime * speed + aOffset * 3.0, 6.0);
                pos.y += rise;
                // Gentle horizontal sway so they don't rise in a straight column
                pos.x += sin(uTime * 0.3 + aOffset * 5.0) * 0.06;
                pos.z += cos(uTime * 0.25 + aOffset * 3.7) * 0.06;
                // Fade-style: shrink point as it gets high (handled via aRandom small scatter)
                pos += aRandom * 0.03;
            }
            // Non-drifters: stay exactly at original position (shape preserved)
            // Only apply scatter when hand opens
            pos += aRandom * uProgress * 2.5;

        } else if(uPhysics == 5){
            // ── 4D Tesseract Flow ────────────────────────────────────────────
            // Always-on idle rotation in 4D so the effect is visible even
            // without hand gestures. Progress amplifies the rotation angle.
            float w = 0.0;

            // Idle: slow continuous 4D spin (always active)
            // Gesture: adds up to ~160° of dramatic inversion
            float idle    = uTime * 0.08;                 // always runs
            float gesture = uProgress * 2.8;              // 0→160° with hand
            float angle   = idle + gesture;

            // Primary XW rotation
            float cosA = cos(angle);
            float sinA = sin(angle);
            float xRot = pos.x * cosA - w * sinA;
            float wRot = pos.x * sinA + w * cosA;

            // Secondary ZW rotation (half-speed, preserves Y spread)
            float cosB = cos(angle * 0.5);
            float sinB = sin(angle * 0.5);
            float zRot   = pos.z * cosB - wRot * sinB;
            float wFinal = pos.z * sinB + wRot * cosB;

            // Stereographic projection 4D→3D
            float dist4 = 2.5;
            projScale = dist4 / (dist4 - wFinal);
            projScale = clamp(projScale, 0.4, 5.0);

            pos.x = xRot  * projScale;
            pos.y = pos.y  * projScale;
            pos.z = zRot   * projScale;

            // Scatter on gesture
            pos += aRandom * uProgress * 0.6 * projScale;

        } else if(uPhysics == 6){
            // ── Aizawa Attractor (Chaos) ─────────────────────────────────────
            // Aizawa attractor differential equations applied as a displacement
            // field. Particles are "captured" into chaotic orbital paths as the
            // hand opens — creating a living, breathing soul-cocoon shape.
            // Parameters tuned to stay within ~[-2,2] range.
            float a = 0.95, b = 0.7, c = 0.6, d = 3.5, ee = 0.25, f = 0.1;
            vec3 p = position * 0.9; // scale input to attractor's sweet spot

            // Evaluate instantaneous velocity field at this particle's position
            float dx = (p.z - b) * p.x - d * p.y;
            float dy = d * p.x + (p.z - b) * p.y;
            float dz = c + a * p.z
                       - (p.z * p.z * p.z) / 3.0
                       - (p.x * p.x + p.y * p.y) * (1.0 + ee * p.z)
                       + f * p.z * p.x * p.x * p.x;

            // Idle: always apply a base attractor pull (dt=0.15) so the
            // effect is visible without hand gestures. Gesture adds more.
            float dt = 0.15 + uProgress * 0.5;
            vec3 vel = vec3(dx, dy, dz);
            pos += vel * dt;
            // Second Euler step for smoother arcs
            vec3 p2 = (position + vel * dt * 0.5) * 0.9;
            float dx2 = (p2.z - b) * p2.x - d * p2.y;
            float dy2 = d * p2.x + (p2.z - b) * p2.y;
            float dz2 = c + a * p2.z - (p2.z*p2.z*p2.z)/3.0
                        - (p2.x*p2.x + p2.y*p2.y) * (1.0 + ee * p2.z)
                        + f * p2.z * p2.x * p2.x * p2.x;
            pos += vec3(dx2, dy2, dz2) * dt * 0.4;

            // Always-on slow cocoon spin + extra with gesture
            pos = rotateY(pos, uTime * 0.12 + uProgress * 0.5);

            // Subtle scatter
            pos += aRandom * (0.05 + uProgress * 0.35);

        } else {
            // Linear
            pos += aRandom * uProgress * 2.5;
        }

        // ── Curl noise overlay ────────────────────────────────────────────────
        if(uCurl){
            vec3 cn = curlNoise(pos * 1.5 + uTime * 0.15) * uProgress * 1.2;
            pos += cn;
        }

        // ── Mouse repulsion field ────────────────────────────────────────────
        // Particles near the cursor are pushed radially outward, creating a
        // "hole" that follows the mouse. The slow lerp on uMouse (JS side)
        // means when the cursor moves away, the repulsion zone slides off
        // gradually → particles drift back to rest over ~1 second.
        if(uRipple){
            vec2 worldXY = (modelMatrix * vec4(pos, 1.0)).xy;
            float d = distance(worldXY, uMouse);
            // Repulsion radius in world units
            float radius = 1.8;
            float strength = smoothstep(radius, 0.0, d);
            strength = strength * strength;
            if(d > 0.001){
                vec2 pushDir = normalize(worldXY - uMouse);
                pos.xy += pushDir * strength * 0.8;
            }
            pos.z += strength * 0.15 * sin(d * 5.0 + uTime * 2.0);
            vBrightBoost *= 1.0 + strength * 0.3;
        }

        // ── Flicker: jitter position slightly ────────────────────────────────
        float flickerPhase = fract(sin(aOffset * 127.1 + uTime * 0.4) * 43758.5453);
        float flickerOn = step(0.92, flickerPhase);
        if(uFlicker){
            pos += aRandom * flickerOn * 0.02;
        }

        // ── Erosion / weathering ─────────────────────────────────────────────
        // Full lifecycle driven by uErodePhase (JS):
        //   0.0 → 0.55 : erosion front sweeps across — particles peel off
        //   0.55→ 0.70 : fully eroded, all debris floating
        //   0.70→ 1.00 : reassembly — particles fly back and snap into shape
        float erodeAlpha = 1.0;
        if(uErode){
            // Static noise per particle (no time drift) so each particle has a
            // fixed "resistance" value — lower = erodes first
            vec3 noiseCoord = position * 1.8;
            float n = snoise(noiseCoord) * 0.6
                    + snoise(noiseCoord * 2.3 + 5.0) * 0.3
                    + snoise(noiseCoord * 5.7 + 11.0) * 0.1;
            // n is in ~[-1, 1]; remap to [0, 1]
            float resistance = n * 0.5 + 0.5;

            // Erode phase: threshold sweeps 0→1 eroding everything
            // Reassemble phase: threshold sweeps 1→0 restoring everything
            float threshold;
            bool reassembling = uErodePhase > 0.70;
            if(!reassembling){
                // 0→0.55: sweep threshold from -0.1 to 1.1 (eat all particles)
                threshold = (uErodePhase / 0.55) * 1.2 - 0.1;
            } else {
                // 0.70→1.0: sweep threshold back from 1.1 to -0.1
                float t = (uErodePhase - 0.70) / 0.30;
                threshold = 1.1 - t * 1.2;
            }
            float edge = smoothstep(threshold - 0.08, threshold + 0.08, resistance);
            erodeAlpha = edge;

            if(!reassembling){
                // ── Eroding: edge particles peel off and fly away ────────────
                if(erodeAlpha < 0.7){
                    float depth = 1.0 - clamp(erodeAlpha / 0.7, 0.0, 1.0);
                    // Each particle has a unique launch slot
                    float seed = fract(sin(aOffset * 317.5) * 9471.3);
                    // Wind: outward from surface + upward-rightward breeze
                    vec3 outDir = normalize(position + vec3(0.001));
                    vec3 wind = normalize(vec3(0.5, 0.4, 0.1));
                    vec3 flyDir = normalize(outDir * 0.4 + wind * 0.6);
                    // flyProgress: how long since this particle was "freed"
                    float flyProgress = clamp(depth * 2.5, 0.0, 1.0);
                    pos += flyDir * flyProgress * flyProgress * 3.5;
                    // Tumble
                    pos.x += sin(uTime * 1.8 + seed * 20.0) * flyProgress * 0.2;
                    pos.y += cos(uTime * 1.4 + seed * 15.0) * flyProgress * 0.12;
                    // Visible edge debris, invisible deep eroded
                    erodeAlpha = depth < 0.7
                        ? 0.5 + 0.5 * (1.0 - flyProgress)
                        : 0.0;
                }
            } else {
                // ── Reassembling: particles fly BACK to original position ────
                float t = (uErodePhase - 0.70) / 0.30; // 0→1
                // Each particle waits for its resistance slot before returning
                float delay = 1.0 - resistance; // high-resistance particles return last
                float localT = clamp((t - delay * 0.4) / 0.6, 0.0, 1.0);
                float ease = localT * localT * (3.0 - 2.0 * localT); // smoothstep ease
                // Start dispersed (match erode dispersion), fly back to origin
                vec3 outDir = normalize(position + vec3(0.001));
                vec3 dispersedPos = position + outDir * 3.5 + vec3(1.8, 1.4, 0.4) * 0.5;
                pos = mix(dispersedPos, position, ease);
                // Alpha fades in as particle arrives
                erodeAlpha = ease;
            }
        }

        // ── Base float ───────────────────────────────────────────────────────
        pos.y += sin(uTime * 0.5 + aOffset) * 0.02;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        float baseSize = uFlicker ? (15.0 + flickerOn * 6.0) : 15.0;
        // Eroded particles shrink; 4D projScale for depth
        gl_PointSize = baseSize * projScale * erodeAlpha / -mvPosition.z;
        gl_Position = projectionMatrix * mvPosition;

        vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
        vOpacity = (1.0 - uProgress * 0.8) * erodeAlpha;
        vBrightBoost = uFlicker ? (0.6 + flickerOn * 0.4) : 1.0;
        vHoloBrightness = uHolo ? uHoloBrightness : 1.0;

        // ── Color modes ───────────────────────────────────────────────────────
        float temperature = 1.0 - clamp(length(position.xz) * 0.5, 0.0, 1.0);

        if(uColorMode == 2){
            // Aurora: hue shifts along world Y + time
            float hue = fract(vWorldPos.y * 0.25 + uTime * 0.04);
            float band = sin(vWorldPos.y * 5.0 - uTime * 1.5) * 0.5 + 0.5;
            vColor = hsv2rgb(vec3(hue, 0.75, 0.8 + band * 0.2));

        } else if(uColorMode == 3){
            // Thermal: cold blue → warm orange by distance from center
            vec3 cold = vec3(0.1, 0.2, 0.9);
            vec3 cool = vec3(0.2, 0.8, 1.0);
            vec3 warm = vec3(1.0, 0.9, 0.5);
            vec3 hot  = vec3(1.0, 0.35, 0.05);
            if(temperature < 0.33)      vColor = mix(cold, cool, temperature/0.33);
            else if(temperature < 0.66) vColor = mix(cool, warm, (temperature-0.33)/0.33);
            else                        vColor = mix(warm, hot,  (temperature-0.66)/0.34);
            // Hot particles vibrate more
            pos.xz += vec2(sin(uTime*8.+aOffset*20.), cos(uTime*7.+aOffset*15.)) * temperature * 0.08;
            vColor *= (0.7 + temperature * 0.5);

        } else if(uColorMode == 4){
            // Zone coloring: head/body/legs colored by Y position
            float yRange = uModelYMax - uModelYMin;
            float yN = (position.y - uModelYMin) / max(yRange, 0.001);
            float legW   = 1.0 - smoothstep(0.35, 0.45, yN);
            float headW  = smoothstep(0.70, 0.80, yN);
            float torsoW = 1.0 - legW - headW;
            vColor = uZoneColorLegs * legW + uZoneColorBody * torsoW + uZoneColorHead * headW;

        } else if(uColorMode == 1){
            // Textured: use aColor attribute
            vColor = aColor;
        } else {
            // Default cyan
            vColor = vec3(0.5, 0.8, 1.0);
        }
    }
`;

const fragmentShader = `
    varying vec3 vColor;
    varying float vOpacity;
    varying float vBrightBoost;
    varying float vHoloBrightness;
    uniform int uColorMode;

    void main(){
        float d = distance(gl_PointCoord, vec2(0.5));
        float strength = clamp(0.05 / d - 0.1, 0.0, 1.0);
        float finalBright = vBrightBoost * vHoloBrightness;
        vec3 col = vColor;
        if (uColorMode == 1) {
            // Texture mode: reduce additive brightness to prevent dense
            // regions from washing out (pink stamen → yellow).
            col *= 0.6;
        }
        gl_FragColor = vec4(col * finalBright, strength * vOpacity * vHoloBrightness);
    }
`;

// ─── Three.js setup ───────────────────────────────────────────────────────────
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('container').appendChild(renderer.domElement);

controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Bloom composer
composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.5, 0.82);
composer.addPass(bloomPass);
bloomPass.enabled = false;

// ─── Texture sampler ─────────────────────────────────────────────────────────
// Reads the full image ONCE into a flat array, then does O(1) lookups per UV.
// Respects texture.flipY (GLB sets flipY=false, meaning V=0 is at top of image).
// Applies texture.offset/repeat transforms for correct UV→pixel mapping.
// No gamma conversion — ShaderMaterial bypasses Three.js color management,
// so raw sRGB canvas pixels → shader → screen is the correct pipeline.
function buildTextureSampler(texture) {
    const img = texture.image;
    const w = img.width, h = img.height;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, w, h).data;

    // Texture transforms (offset, repeat)
    const ox = texture.offset ? texture.offset.x : 0;
    const oy = texture.offset ? texture.offset.y : 0;
    const rx = texture.repeat ? texture.repeat.x : 1;
    const ry = texture.repeat ? texture.repeat.y : 1;
    const flip = texture.flipY;  // true for normal textures, false for GLB

    return (u, v) => {
        // Apply repeat + offset
        let tu = u * rx + ox;
        let tv = v * ry + oy;
        // Wrap to [0,1]
        tu = ((tu % 1) + 1) % 1;
        tv = ((tv % 1) + 1) % 1;
        // Canvas y=0 is top. For flipY=true (standard), V=0 is bottom → need 1-tv.
        // For flipY=false (GLB), V=0 is already top → use tv directly.
        const px = Math.min(w - 1, Math.floor(tu * w));
        const py = Math.min(h - 1, Math.floor((flip ? (1 - tv) : tv) * h));
        const i = (py * w + px) * 4;
        return [data[i] / 255, data[i + 1] / 255, data[i + 2] / 255];
    };
}

// ─── Color extraction ─────────────────────────────────────────────────────────
// For image entries (gltf === null), cachedColors holds the precomputed colors.
// We use the item's stored colors directly in that case.
function extractColors(gltf, useTexture, itemColors) {
    // Image-sourced entry: return cached colors directly
    if (gltf === null) {
        if (!itemColors) return [];
        if (!useTexture) {
            // Replace with flat cyan
            const out = [];
            for (let i = 0; i < itemColors.length / 3; i++) out.push(0.5, 0.8, 1.0);
            return out;
        }
        return Array.from(itemColors);
    }

    const colors = [];
    gltf.scene.traverse((child) => {
        if (!child.isMesh) return;
        const geo = child.geometry;
        const posAttr = geo.attributes.position;
        if (!useTexture) {
            for (let i = 0; i < posAttr.count; i++) colors.push(0.5, 0.8, 1.0);
            return;
        }
        const colAttr = geo.attributes.color;
        const uvAttr  = geo.attributes.uv;
        const tex     = child.material?.map;
        let sample = null;
        if (tex && tex.image && uvAttr) { try { sample = buildTextureSampler(tex); } catch(e) {} }
        for (let i = 0; i < posAttr.count; i++) {
            if (sample && uvAttr) colors.push(...sample(uvAttr.getX(i), uvAttr.getY(i)));
            else if (child.material?.color) { const c = child.material.color; colors.push(c.r, c.g, c.b); }
            else if (colAttr) colors.push(colAttr.getX(i), colAttr.getY(i), colAttr.getZ(i));
            else colors.push(0.5, 0.8, 1.0);
        }
    });
    return colors;
}

// ─── Build particle system ────────────────────────────────────────────────────
function buildPoints(vertices, colors) {
    if (points) { scene.remove(points); points.geometry.dispose(); points.material.dispose(); }

    const posArray = new Float32Array(vertices);
    const count = posArray.length / 3;

    const randoms = new Float32Array(count * 3);
    const offsets = new Float32Array(count);
    for (let i = 0; i < count * 3; i++) randoms[i] = (Math.random() - 0.5) * 2;
    for (let i = 0; i < count; i++) offsets[i] = Math.random() * Math.PI * 2;

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
    geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(new Float32Array(colors), 3));

    // Sculpt deformation buffer (persistent offsets)
    const deformation = new Float32Array(count * 3);
    geometry.setAttribute('aDeformation', new THREE.BufferAttribute(deformation, 3));

    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime:               { value: 0 },
            uProgress:           { value: 0 },
            uPhysics:            { value: 0 },
            uColorMode:          { value: 0 },
            uFlicker:            { value: false },
            uHolo:               { value: false },
            uHoloBrightness:     { value: 1.0 },
            uCurl:               { value: false },
            uRipple:             { value: false },
            uErode:              { value: false },
            uErodePhase:         { value: 0.0 },
            uMouse:              { value: new THREE.Vector2(-999, -999) },
            uPalm:               { value: new THREE.Vector2(0, 0) },
            uSculptMode:         { value: false },
            uHeadScale:          { value: 1.0 },
            uTorsoScale:         { value: 1.0 },
            uLegScale:           { value: 1.0 },
            uZoneColorHead:      { value: new THREE.Vector3(0.5, 0.8, 1.0) },
            uZoneColorBody:      { value: new THREE.Vector3(0.5, 0.8, 1.0) },
            uZoneColorLegs:      { value: new THREE.Vector3(0.5, 0.8, 1.0) },
            uModelYMin:          { value: modelBoundsY.min },
            uModelYMax:          { value: modelBoundsY.max }
        },
        vertexShader, fragmentShader,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });

    points = new THREE.Points(geometry, material);
    points.scale.setScalar(4);
    scene.add(points);
    syncUniforms();
}

function syncUniforms() {
    if (!points) return;
    const u = points.material.uniforms;
    u.uPhysics.value   = ['linear','vortex','accretion','gravity','drift','tesseract','aizawa'].indexOf(physicsMode);
    u.uColorMode.value = ['untextured','textured','aurora','thermal','zone'].indexOf(colorMode);
    u.uFlicker.value   = fx.flicker;
    u.uHolo.value      = fx.holo;
    u.uCurl.value      = fx.curl;
    u.uRipple.value    = fx.ripple;
    u.uErode.value     = fx.erode;
    u.uSculptMode.value = sculptMode;
    u.uModelYMin.value  = modelBoundsY.min;
    u.uModelYMax.value  = modelBoundsY.max;
    // uErodePhase is driven in the animate loop, not here
}

// ─── Holo flicker: cyberpunk hologram brightness ──────────────────────────────
// Strategy: long calm periods (brightness=1) punctuated by burst events
// Each burst = rapid random flickers (5-15 Hz) over ~0.3-0.8s, then calm again
let holoState = { calm: true, burstEnd: 0, nextBurst: 2.0, brightness: 1.0 };

function updateHolo(t) {
    if (!fx.holo || !points) return;
    const u = points.material.uniforms;

    if (holoState.calm) {
        // Smoothly restore brightness
        holoState.brightness += (1.0 - holoState.brightness) * 0.1;
        if (t > holoState.nextBurst) {
            holoState.calm = false;
            holoState.burstEnd = t + 0.3 + Math.random() * 0.6;
        }
    } else {
        // Burst mode: irregular rapid flickers
        // Use multiple layered sin waves at different speeds for irregularity
        const f1 = Math.sin(t * 47.3) * 0.5 + 0.5;  // fast ~7Hz
        const f2 = Math.sin(t * 23.1 + 1.2) * 0.5 + 0.5; // medium ~3Hz
        const f3 = Math.sin(t * 89.7 + 2.4) * 0.5 + 0.5; // very fast ~14Hz
        // Combined: mostly dark with sudden bright spikes
        const combined = Math.min(f1, f2) * f3;
        holoState.brightness = 0.05 + combined * 0.6; // range: 0.05 - 0.65

        if (t > holoState.burstEnd) {
            holoState.calm = true;
            // Next burst: 1.5 - 5 seconds away
            holoState.nextBurst = t + 1.5 + Math.random() * 3.5;
        }
    }

    u.uHoloBrightness.value = holoState.brightness;
}

// ─── GLB Queue (up to 10) ─────────────────────────────────────────────────────
const MAX_QUEUE = 10;
const glbQueue = [];   // [{ vertices, gltf, colors, name }]
let queueIndex = 0;    // currently active

function resampleToCount(vertices, targetCount) {
    const srcCount = vertices.length / 3;
    if (srcCount === targetCount) return new Float32Array(vertices);
    const out = new Float32Array(targetCount * 3);
    for (let i = 0; i < targetCount; i++) {
        const src = Math.floor(Math.random() * srcCount) * 3;
        out[i * 3]     = vertices[src];
        out[i * 3 + 1] = vertices[src + 1];
        out[i * 3 + 2] = vertices[src + 2];
    }
    return out;
}

function renderQueueUI() {
    const list = document.getElementById('glb-queue-list');
    list.innerHTML = '';
    glbQueue.forEach((item, i) => {
        const el = document.createElement('div');
        el.style.cssText = 'font-size:10px;padding:3px 4px;border-radius:3px;margin-bottom:3px;cursor:pointer;border:1px solid #2a2a3e;color:#667;';
        el.textContent = (i === queueIndex ? '▶ ' : '○ ') + item.name;
        if (i === queueIndex) { el.style.borderColor = '#00ffcc88'; el.style.color = '#00ffcc'; }
        el.onclick = () => activateQueueIndex(i);
        list.appendChild(el);
    });
    document.getElementById('btn-reset-swap').style.display = glbQueue.length > 1 ? 'block' : 'none';
    const addGlbBtn = document.getElementById('label-add-glb');
    const addImgBtn = document.getElementById('label-add-image');
    const queueFull = glbQueue.length >= MAX_QUEUE;
    addGlbBtn.style.opacity = queueFull ? '0.3' : '1';
    addGlbBtn.style.pointerEvents = queueFull ? 'none' : 'auto';
    addImgBtn.style.opacity = queueFull ? '0.3' : '1';
    addImgBtn.style.pointerEvents = queueFull ? 'none' : 'auto';
}

function activateQueueIndex(idx) {
    if (idx < 0 || idx >= glbQueue.length) return;
    queueIndex = idx;
    hasSwapped = false;
    const item = glbQueue[idx];
    cachedVertices = item.vertices;
    cachedGltf = item.gltf;
    cachedColors = item.colors || null;
    const colors = extractColors(item.gltf, colorMode === 'textured', item.colors);
    buildPoints(item.vertices, colors);
    renderQueueUI();
    STATUS.textContent = `active: ${item.name} — fist: gather · open: scatter`;
}

// Silent swap during scatter: swap buffers to next in queue
function swapToNext() {
    if (hasSwapped) return;
    const nextIdx = (queueIndex + 1) % glbQueue.length;
    if (nextIdx === queueIndex || glbQueue.length < 2) return;
    hasSwapped = true;

    const geo = points.geometry;
    const targetCount = geo.attributes.position.count;
    const next = glbQueue[nextIdx];

    const newPos = resampleToCount(next.vertices, targetCount);
    geo.attributes.position.array.set(newPos);
    geo.attributes.position.needsUpdate = true;

    const rawColors = extractColors(next.gltf, colorMode === 'textured', next.colors);
    const newColors = resampleToCount(rawColors, targetCount);
    geo.attributes.aColor.array.set(newColors);
    geo.attributes.aColor.needsUpdate = true;

    queueIndex = nextIdx;
    cachedVertices = Array.from(newPos);
    cachedGltf = next.gltf;
    cachedColors = next.colors || null;
    renderQueueUI();
    STATUS.textContent = `switched to: ${next.name} — fist to gather`;
}

window.resetQueue = function() {
    activateQueueIndex(0);
};

// ─── Load model ───────────────────────────────────────────────────────────────
function extractVertices(gltf) {
    const vertices = [];
    let yMin = Infinity, yMax = -Infinity;
    gltf.scene.traverse((child) => {
        if (!child.isMesh) return;
        const pos = child.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const y = pos.getY(i);
            if (y < yMin) yMin = y;
            if (y > yMax) yMax = y;
            vertices.push(pos.getX(i), y, pos.getZ(i));
        }
    });
    if (yMin !== Infinity) {
        modelBoundsY.min = yMin;
        modelBoundsY.max = yMax;
    }
    return vertices;
}

function processGltf(gltf, name) {
    if (glbQueue.length >= MAX_QUEUE) {
        STATUS.textContent = `queue full (max ${MAX_QUEUE})`;
        return;
    }
    const vertices = extractVertices(gltf);
    // colors is null for GLB entries — extracted lazily via extractColors(gltf, ...)
    glbQueue.push({ vertices, gltf, colors: null, name });
    renderQueueUI();

    if (glbQueue.length === 1) {
        // First model: activate immediately
        activateQueueIndex(0);
    } else {
        STATUS.textContent = `queued: ${name} (${glbQueue.length}/${MAX_QUEUE}) — open hand to switch`;
    }
}

// ─── Image → Particles ────────────────────────────────────────────────────────
const IMAGE_BRIGHTNESS_THRESHOLD = 0.15;
const IMAGE_MAX_PARTICLES = 120000;

function processImage(file) {
    if (glbQueue.length >= MAX_QUEUE) {
        STATUS.textContent = `queue full (max ${MAX_QUEUE})`;
        return;
    }
    STATUS.textContent = `loading image: ${file.name}...`;

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
        URL.revokeObjectURL(url);

        // Determine sampling grid size aiming for 50k–150k particles max
        // Start with 300×300 = 90k, adjust based on image aspect ratio
        const aspect = img.width / img.height;
        let gridH = 300;
        let gridW = Math.round(gridH * aspect);
        // Cap to keep particle count reasonable
        const maxDim = Math.round(Math.sqrt(IMAGE_MAX_PARTICLES * aspect));
        if (gridW > maxDim) { gridW = maxDim; gridH = Math.round(gridW / aspect); }

        // Draw image to canvas and sample pixels
        const canvas = document.createElement('canvas');
        canvas.width = gridW;
        canvas.height = gridH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, gridW, gridH);
        const imageData = ctx.getImageData(0, 0, gridW, gridH).data;

        const vertices = [];
        const colors = [];

        // Normalized coordinate range: ±1 (matching GLB model scale convention)
        // x: left→right, y: top→bottom (flip y so top is positive)
        const scaleX = 2.0 / gridW;
        const scaleY = 2.0 / gridH;

        for (let row = 0; row < gridH; row++) {
            for (let col = 0; col < gridW; col++) {
                const idx = (row * gridW + col) * 4;
                const r = imageData[idx]     / 255;
                const g = imageData[idx + 1] / 255;
                const b = imageData[idx + 2] / 255;
                const a = imageData[idx + 3] / 255;

                // Perceived brightness (luminance)
                const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                if (luma < IMAGE_BRIGHTNESS_THRESHOLD || a < 0.1) continue;

                // Center the grid: x in [-1, +1], y in [-1, +1] (flip row)
                const x = (col + 0.5) * scaleX - 1.0;
                const y = 1.0 - (row + 0.5) * scaleY;

                // Map luminance to Z depth — multi-layer bucketing for sculpted-relief look.
                // Bright highlights sit closest to the viewer; dark areas recede.
                // Each bucket gets a small random jitter so layers blend naturally
                // rather than appearing as hard planes.
                let zBase, zRange;
                if (luma > 0.75) {
                    zBase = 0.8;  zRange = 0.4;   // +0.8 … +1.2  (closest)
                } else if (luma > 0.5) {
                    zBase = 0.3;  zRange = 0.3;   // +0.3 … +0.6
                } else if (luma > 0.25) {
                    zBase = -0.1; zRange = 0.3;   // -0.1 … +0.2
                } else {
                    zBase = -0.4; zRange = 0.3;   // -0.4 … -0.1  (darkest, furthest)
                }
                // Deterministic bucket offset + small random jitter (±0.08)
                const z = zBase + Math.random() * zRange + (Math.random() - 0.5) * 0.16;

                vertices.push(x, y, z);
                colors.push(r, g, b);
            }
        }

        if (vertices.length === 0) {
            STATUS.textContent = `image too dark — no particles above threshold`;
            return;
        }

        const name = file.name;
        // Store colors as Float32Array alongside vertices
        const colorsF32 = new Float32Array(colors);
        glbQueue.push({ vertices, gltf: null, colors: colorsF32, name });
        renderQueueUI();

        if (glbQueue.length === 1) {
            activateQueueIndex(0);
            // Gently tilt camera to hint at the Z-depth stratification
            camera.position.set(0.8, 1.2, 5.5);
            controls.target.set(0, 0, 0);
            controls.update();
        } else {
            STATUS.textContent = `queued: ${name} (${glbQueue.length}/${MAX_QUEUE}) — ${vertices.length / 3 | 0} particles`;
        }
    };
    img.onerror = () => {
        URL.revokeObjectURL(url);
        STATUS.textContent = `failed to load image: ${file.name}`;
    };
    img.src = url;
}

// ─── Spring physics ───────────────────────────────────────────────────────────
function updateProgress() {
    if (fx.spring) {
        const force = -0.08 * (currentProgress - targetProgress);
        velocity = (velocity + force) * 0.90;
        currentProgress += velocity;
    } else {
        currentProgress += (targetProgress - currentProgress) * 0.03;
    }
}

// ─── Blue Tears: independent GPU-driven particle system ──────────────────────
// Separate THREE.Points with its own shaders. Particles spawn at mouse position
// on mousemove, burst radially outward like bioluminescent fireworks with
// elongated streaks (white core → cyan → deep blue).
const BT_POOL = 15000;       // particle pool size
const BT_PER_MOVE = 40;      // particles spawned per mousemove
const BT_MAX_LIFE = 2.8;     // seconds each particle lives
let btNextIdx = 0;            // ring-buffer write head
let btPoints = null;          // THREE.Points
let btLastMouse = null;       // last mouse world pos for velocity direction

const btVertexShader = `
    uniform float uTime;
    attribute vec3 aSpawnPos;
    attribute vec3 aVelocity;
    attribute float aSpawnTime;
    attribute float aSeed;

    varying float vLife;
    varying vec2 vVelDir;
    varying float vCoreBright;

    void main(){
        float life = uTime - aSpawnTime;
        float maxLife = ${BT_MAX_LIFE.toFixed(1)};

        // Dead or not-yet-born particles: hide
        if(life < 0.0 || life > maxLife || aSpawnTime < 0.5){
            gl_PointSize = 0.0;
            gl_Position = vec4(99999.0, 99999.0, 0.0, 1.0);
            vLife = 1.0;
            vVelDir = vec2(1.0, 0.0);
            vCoreBright = 0.0;
            return;
        }

        float t = life / maxLife; // 0-1 normalized life
        // Exponential decay for natural deceleration
        float decay = exp(-life * 1.5);
        // Slight gravity pull
        float gravity = -0.08 * life * life;
        // Flutter: gentle sine wobble perpendicular to velocity
        float flutter = sin(life * 4.0 + aSeed * 20.0) * 0.03 * (1.0 - t);

        vec3 pos = aSpawnPos
                 + aVelocity * life * decay
                 + vec3(flutter, gravity + life * 0.06, flutter * 0.7);

        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);

        // Size: burst big then shrink. Speed boosts initial size.
        float speed = length(aVelocity);
        float baseSize = mix(28.0, 4.0, t * t) * (0.6 + speed * 0.15);
        gl_PointSize = clamp(baseSize / -mvPos.z, 1.0, 120.0);
        gl_Position = projectionMatrix * mvPos;

        vLife = t;
        vCoreBright = (1.0 - t) * (1.0 - t); // bright at start

        // Screen-space velocity direction for streak elongation
        vec3 velDir3 = normalize(aVelocity + vec3(0.001));
        vec4 mvNext = modelViewMatrix * vec4(pos + velDir3 * 0.1, 1.0);
        vec4 s1 = projectionMatrix * mvPos;
        vec4 s2 = projectionMatrix * mvNext;
        vec2 screenDir = (s2.xy / s2.w) - (s1.xy / s1.w);
        float len = length(screenDir);
        vVelDir = len > 0.0001 ? screenDir / len : vec2(1.0, 0.0);
    }
`;

const btFragmentShader = `
    varying float vLife;
    varying vec2 vVelDir;
    varying float vCoreBright;

    void main(){
        vec2 uv = gl_PointCoord - 0.5;

        // Rotate UV to align with velocity direction for streak
        float angle = atan(vVelDir.y, vVelDir.x);
        float ca = cos(-angle), sa = sin(-angle);
        vec2 rotUV = vec2(uv.x * ca - uv.y * sa, uv.x * sa + uv.y * ca);

        // Elongated ellipse: stretch along velocity direction
        float stretch = mix(3.5, 1.2, vLife); // fresh = very elongated
        float d = length(vec2(rotUV.x / stretch, rotUV.y));

        // Soft glow falloff
        float glow = 0.015 / (d * d + 0.015);
        glow *= (1.0 - vLife);          // fade over lifetime
        glow = clamp(glow, 0.0, 1.0);

        // Color: white core -> bright cyan -> deep blue -> fade
        vec3 white = vec3(1.0, 1.0, 1.0);
        vec3 cyan  = vec3(0.15, 0.65, 1.0);
        vec3 blue  = vec3(0.03, 0.12, 0.45);

        vec3 col;
        if(vLife < 0.12) col = mix(white, cyan, vLife / 0.12);
        else             col = mix(cyan, blue, (vLife - 0.12) / 0.88);

        // Hot core highlight
        float core = 0.004 / (d * d + 0.004);
        col += white * core * vCoreBright * 0.6;

        // Outer faint halo
        float halo = 0.06 / (d + 0.06);
        col += cyan * halo * 0.08 * (1.0 - vLife);

        float alpha = glow;
        if(alpha < 0.001) discard;
        gl_FragColor = vec4(col * glow, alpha);
    }
`;

function initBlueTears(){
    const spawnPos  = new Float32Array(BT_POOL * 3);
    const velocity  = new Float32Array(BT_POOL * 3);
    const spawnTime = new Float32Array(BT_POOL);
    const seed      = new Float32Array(BT_POOL);

    for(let i = 0; i < BT_POOL; i++){
        spawnTime[i] = 0.0;
        seed[i] = Math.random();
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',   new THREE.BufferAttribute(new Float32Array(BT_POOL * 3), 3));
    geo.setAttribute('aSpawnPos',  new THREE.BufferAttribute(spawnPos, 3));
    geo.setAttribute('aVelocity',  new THREE.BufferAttribute(velocity, 3));
    geo.setAttribute('aSpawnTime', new THREE.BufferAttribute(spawnTime, 1));
    geo.setAttribute('aSeed',      new THREE.BufferAttribute(seed, 1));

    const mat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader:   btVertexShader,
        fragmentShader: btFragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    btPoints = new THREE.Points(geo, mat);
    btPoints.frustumCulled = false;
    btPoints.visible = false;
    scene.add(btPoints);
}
initBlueTears();

// Emit particles at a world position with mouse velocity
function btEmit(worldX, worldY, mouseDirX, mouseDirY){
    if(!btPoints || !fx.blueTears) return;
    const time = performance.now() * 0.001;
    const geo = btPoints.geometry;
    const posArr  = geo.attributes.aSpawnPos.array;
    const velArr  = geo.attributes.aVelocity.array;
    const timeArr = geo.attributes.aSpawnTime.array;

    const mouseSpeed = Math.sqrt(mouseDirX * mouseDirX + mouseDirY * mouseDirY);
    const energy = Math.min(mouseSpeed * 0.8 + 0.3, 3.0);

    for(let n = 0; n < BT_PER_MOVE; n++){
        const i = btNextIdx;
        btNextIdx = (btNextIdx + 1) % BT_POOL;
        const i3 = i * 3;

        posArr[i3]     = worldX + (Math.random() - 0.5) * 0.15;
        posArr[i3 + 1] = worldY + (Math.random() - 0.5) * 0.15;
        posArr[i3 + 2] = (Math.random() - 0.5) * 0.1;

        const angle = Math.random() * Math.PI * 2;
        const speed = (0.8 + Math.random() * 2.5) * energy;
        const biasFactor = 0.35;
        velArr[i3]     = Math.cos(angle) * speed + mouseDirX * biasFactor;
        velArr[i3 + 1] = Math.sin(angle) * speed + mouseDirY * biasFactor;
        velArr[i3 + 2] = (Math.random() - 0.5) * speed * 0.3;

        timeArr[i] = time + Math.random() * 0.05;
    }

    geo.attributes.aSpawnPos.needsUpdate  = true;
    geo.attributes.aVelocity.needsUpdate  = true;
    geo.attributes.aSpawnTime.needsUpdate = true;
}

// ─── Animation loop ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;

    if (points) {
        points.rotation.y += 0.004;
        updateProgress();
        updateHolo(time);

        // Auto-swap to next GLB when fully scattered
        if (!hasSwapped && glbQueue.length > 1 && currentProgress > 0.95) {
            swapToNext();
        }
        // Reset hasSwapped when particles are gathered (allow next scatter to trigger swap)
        if (hasSwapped && currentProgress < 0.05) {
            hasSwapped = false;
        }
        const u = points.material.uniforms;
        u.uTime.value     = time;
        u.uProgress.value = Math.max(0, Math.min(1, currentProgress));
        // Erode cycle: 3s erode, 1s hold, 20s reassemble, 3s pause → repeat
        if (fx.erode) {
            const cycleDur = 27.0; // 3 + 1 + 20 + 3
            const cycleT = (time % cycleDur) / cycleDur;
            // Breakpoints: erode=3/27, hold=4/27, reassemble=24/27, pause=27/27
            const E = 3/27, H = 4/27, R = 24/27;
            let phase;
            if (cycleT < E)      phase = (cycleT / E) * 0.55;
            else if (cycleT < H) phase = 0.55 + (cycleT - E) / (H - E) * 0.15;
            else if (cycleT < R) phase = 0.70 + (cycleT - H) / (R - H) * 0.30;
            else                 phase = 0.0;
            u.uErodePhase.value = phase;
        } else {
            u.uErodePhase.value = 0.0; // fully intact when off
        }
        u.uPalm.value.set(palmX, palmY);
        // Mouse tracking: fast follow (0.15) when mouse moves toward model,
        // slow recovery (0.03) when mouse moves away → repulsion lingers
        if (fx.ripple) {
            const dx = mouseWorld.x - u.uMouse.value.x;
            const dy = mouseWorld.y - u.uMouse.value.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            // Fast approach, slow release
            const rate = dist > 0.5 ? 0.15 : 0.03;
            u.uMouse.value.x += dx * rate;
            u.uMouse.value.y += dy * rate;
        }

    }

    // Blue tears: update time uniform
    if (btPoints && fx.blueTears) {
        btPoints.material.uniforms.uTime.value = time;
    }

    controls.update();
    if (fx.bloom) composer.render();
    else renderer.render(scene, camera);
}
animate();

// Sculpt brush: raycasting on mouse drag
const brushCursor = document.getElementById('brush-cursor');
const raycaster = new THREE.Raycaster();

function sculptApplyBrush(clientX, clientY) {
    if (!points || !sculptMode || !sculptMouseDown) return;

    // World-space mouse position at z=0 plane
    const ndcX =  (clientX / window.innerWidth) * 2 - 1;
    const ndcY = -(clientY / window.innerHeight) * 2 + 1;
    const vec = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
    const dir = vec.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const worldPos = camera.position.clone().add(dir.multiplyScalar(dist));

    // Model is scaled by points.scale (4), offset that
    const scale = points.scale.x;
    const localX = worldPos.x / scale;
    const localY = worldPos.y / scale;

    const posArr = points.geometry.attributes.position.array;
    const defArr = points.geometry.attributes.aDeformation.array;
    const count = posArr.length / 3;
    const r2 = brushSize * brushSize;

    for (let i = 0; i < count; i++) {
        const i3 = i * 3;
        const px = posArr[i3] + defArr[i3];
        const py = posArr[i3 + 1] + defArr[i3 + 1];
        const dx = px - localX;
        const dy = py - localY;
        const d2 = dx * dx + dy * dy;
        if (d2 > r2) continue;

        const falloff = 1.0 - Math.sqrt(d2) / brushSize; // 1 at center, 0 at edge
        const strength = falloff * falloff * brushStrength;

        if (brushType === 'push') {
            // Push outward from brush center
            const len = Math.sqrt(d2) || 0.001;
            defArr[i3]     += (dx / len) * strength;
            defArr[i3 + 1] += (dy / len) * strength;
            defArr[i3 + 2] += (Math.random() - 0.5) * strength * 0.3;
        } else if (brushType === 'pull') {
            // Pull toward brush center
            const len = Math.sqrt(d2) || 0.001;
            defArr[i3]     -= (dx / len) * strength;
            defArr[i3 + 1] -= (dy / len) * strength;
        } else if (brushType === 'smooth') {
            // Smooth: relax deformation toward zero
            defArr[i3]     *= (1.0 - strength * 0.5);
            defArr[i3 + 1] *= (1.0 - strength * 0.5);
            defArr[i3 + 2] *= (1.0 - strength * 0.5);
        }
    }
    points.geometry.attributes.aDeformation.needsUpdate = true;
}

    }
});

// Scroll wheel = adjust brush size in sculpt mode
renderer.domElement.addEventListener('wheel', (e) => {
    if (!sculptMode) return;
    e.preventDefault();
    brushSize = Math.max(0.1, Math.min(3.0, brushSize - e.deltaY * 0.002));
    document.getElementById('brush-size').value = brushSize;
    document.getElementById('brush-size-val').textContent = brushSize.toFixed(1);
}, { passive: false });

// ─── Fullscreen ───────────────────────────────────────────────────────────────
const uiOverlay = document.getElementById('ui-overlay');
let fsHideTimer = null;

function showUI() {
    uiOverlay.classList.remove('fs-hidden');
    clearTimeout(fsHideTimer);
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        fsHideTimer = setTimeout(() => uiOverlay.classList.add('fs-hidden'), 2500);
    }
}

document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

window.toggleFullscreen = function() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
};

document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    const btn = document.getElementById('btn-fullscreen');
    btn.textContent = isFs ? '✕ exit full' : '⛶ fullscreen';
    btn.classList.toggle('toggle-on', isFs);
    if (!isFs) {
        clearTimeout(fsHideTimer);
        uiOverlay.classList.remove('fs-hidden');
    } else {
        // Start hide timer when entering fullscreen
        fsHideTimer = setTimeout(() => uiOverlay.classList.add('fs-hidden'), 2500);
    }
});

// ─── Background music ─────────────────────────────────────────────────────────
const bgm = document.getElementById('bgm');
bgm.volume = 0.5;

// Try multiple paths for local dev vs GitHub Pages
const tryPaths = ['Sakura_Plains.mp3', './Sakura_Plains.mp3'];
let pathIdx = 0;
function loadNextAudioPath() {
    if (pathIdx >= tryPaths.length) return;
    bgm.src = tryPaths[pathIdx++];
    bgm.load();
}
bgm.addEventListener('error', loadNextAudioPath);
loadNextAudioPath();

const musicBar  = document.getElementById('music-bar');
const btnPP     = document.getElementById('btn-play-pause');
const musicVol  = document.getElementById('music-vol');
let musicBarOpen = false;

window.toggleMusicBar = function() {
    musicBarOpen = !musicBarOpen;
    musicBar.classList.toggle('visible', musicBarOpen);
    document.getElementById('btn-music').classList.toggle('toggle-on', musicBarOpen);
    if (musicBarOpen && bgm.paused) {
        bgm.play().then(() => { btnPP.textContent = '⏸'; }).catch(() => {
            // If blocked, wait for next user gesture
            btnPP.textContent = '▶';
        });
    }
};

btnPP.addEventListener('click', () => {
    if (bgm.paused) {
        bgm.play().then(() => { btnPP.textContent = '⏸'; }).catch(() => {});
    } else {
        bgm.pause();
        btnPP.textContent = '▶';
    }
});

// Keep button icon in sync
bgm.addEventListener('play',  () => { btnPP.textContent = '⏸'; });
bgm.addEventListener('pause', () => { btnPP.textContent = '▶'; });

musicVol.addEventListener('input', () => { bgm.volume = parseFloat(musicVol.value); });

document.getElementById('btn-music-close').addEventListener('click', () => {
    musicBarOpen = false;
    musicBar.classList.remove('visible');
    document.getElementById('btn-music').classList.remove('toggle-on');
});

// ─── Mouse → world coords for ripple ─────────────────────────────────────────
// Convert NDC mouse to approximate world-space XY at z=0 (the lotus plane).
// The lotus is scale=4 and sits at origin, so world extents are roughly ±8.
window.addEventListener('mousemove', (e) => {
    // NDC: [-1, 1]
    const ndcX =  (e.clientX / window.innerWidth)  * 2 - 1;
    const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;
    // Unproject to world Z=0 plane via raycasting approach
    const vec = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
    const dir = vec.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const worldPos = camera.position.clone().add(dir.multiplyScalar(dist));
    mouseWorld.set(worldPos.x, worldPos.y);

    // Blue tears: emit particles along mouse trail
    if (fx.blueTears) {
        let dx = 0, dy = 0;
        if (btLastMouse) {
            dx = worldPos.x - btLastMouse.x;
            dy = worldPos.y - btLastMouse.y;
        }
        btEmit(worldPos.x, worldPos.y, dx * 8, dy * 8);
        btLastMouse = { x: worldPos.x, y: worldPos.y };
    }
});


// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

// ─── MediaPipe hand tracking ──────────────────────────────────────────────────
function initHands() {
    const timer = setInterval(() => {
        if (!window.Hands || !window.Camera) return;
        clearInterval(timer);
        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(res => {
            if (!res.multiHandLandmarks?.length) return;
            const lm = res.multiHandLandmarks[0];
            // Palm center for gravity mode
            palmX = (lm[9].x - 0.5) * 8.0;
            palmY = -(lm[9].y - 0.5) * 6.0;
            // Open/close detection
            const tips = [8, 12, 16, 20];
            const avg = tips.reduce((s, i) => s + Math.hypot(lm[i].x - lm[0].x, lm[i].y - lm[0].y), 0) / 4;
            if (avg > 0.35) targetProgress = 1.0;
            else if (avg < 0.22) targetProgress = 0.0;
        });
        new Camera(document.getElementById('input_video'), {
            onFrame: async () => await hands.send({ image: document.getElementById('input_video') }),
            width: 640, height: 480
        }).start();
    }, 150);
}
initHands();
